name: CI

# Runs on every push to a non-main branch and on every PR targeting main.
# Push-to-main itself doesn't trigger — by the time it lands the branch
# CI already passed via the PR. This avoids paying twice for the same
# commit on a typical PR → merge flow.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

# If a new commit arrives on a PR before the previous run finishes,
# cancel the in-flight one. Keeps queue time honest on noisy branches.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version comes from the "packageManager" field in package.json so CI,
        # Vercel, and local all use the same pnpm that wrote the lockfile.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      # Build with the PUBLIC Supabase env so CI mirrors prod/Vercel. Not every
      # page degrades env-lessly (auth-gated dashboards + cached feeds touch
      # Supabase at prerender), so the build needs these. They're the public
      # client values (anon key is RLS-scoped and already shipped in the browser
      # bundle) — add them as repo secrets: NEXT_PUBLIC_SUPABASE_URL +
      # NEXT_PUBLIC_SUPABASE_ANON_KEY. The build never hits the DB (prerender
      # has no session), so no service key is required.
      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # Security regression gate — re-runs the live exploits (B1/B2/B6) and
      # FAILS if any reopens. Runs ONLY when SECURITY_TEST_* secrets are set
      # (point them at a STAGING project — it creates+deletes a probe signup
      # each run). Skips cleanly otherwise so CI isn't blocked until configured.
      - name: Security regression (staging only)
        # Gate in shell, NOT in `if:` — the `secrets` context isn't allowed in
        # `if` conditions and broke the workflow parse. Skips cleanly when the
        # SECURITY_TEST_* secrets aren't set; otherwise runs the exploit gate.
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "No SECURITY_TEST_* secrets configured — skipping."
            exit 0
          fi
          pnpm test:security
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SECURITY_TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SECURITY_TEST_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SECURITY_TEST_SERVICE_ROLE_KEY }}

  # ── REQUIRED money/auction RPC integration gate ──────────────────────────
  # The audit's #1 finding: the SECURITY DEFINER PL/pgSQL RPCs that move money
  # (place_bid, close_auction_on_purchase, seller_earnings, seller_balance,
  # request_payout) had ZERO automated tests. This job stands up a THROWAWAY
  # local Supabase stack, applies supabase/migrations/** in full (auth/storage
  # schemas, anon/authenticated/service_role roles, pg_cron, auth.uid()), and
  # runs the integration suite against it. No secrets — the stack mints its own
  # keys, so this runs on EVERY PR to main and is REQUIRED (not gated behind
  # optional staging secrets like the exploit gate above). GitHub-hosted runners
  # ship Docker, which `supabase start` needs.
  rpc-integration:
    name: Money/auction RPC integration (local Supabase stack)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Brings up the local stack and APPLIES supabase/migrations/** to a real
      # Supabase Postgres (a bare postgres can't run these migrations).
      - name: Start local Supabase stack
        run: supabase start

      # Map the stack's connection vars into the names the suite reads. We use
      # the DEFAULT `-o env` output (API_URL / ANON_KEY / SERVICE_ROLE_KEY /
      # DB_URL — stable across CLI versions) and remap, instead of the
      # `--override-name` flag whose dotted keys drift between CLI releases and
      # silently emitted nothing (→ "Invalid supabaseUrl" in every test). The
      # `cat` keeps the resolved values visible in the log for debugging.
      # (The local stack mints its own keys — nothing secret.)
      - name: Export stack connection env
        run: |
          supabase status -o env | tee stack.env
          set -a; . ./stack.env; set +a
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "SUPABASE_DB_URL=${DB_URL}"
          } >> "$GITHUB_ENV"

      - name: RPC integration tests
        run: pnpm test:rpc

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup || true

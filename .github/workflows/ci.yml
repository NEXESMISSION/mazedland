name: CI

# Runs on every push to a non-main branch and on every PR targeting main.
# Push-to-main itself doesn't trigger — by the time it lands the branch
# CI already passed via the PR. This avoids paying twice for the same
# commit on a typical PR → merge flow.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

# If a new commit arrives on a PR before the previous run finishes,
# cancel the in-flight one. Keeps queue time honest on noisy branches.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

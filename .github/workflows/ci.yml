name: CI

# Runs on every push to a non-main branch and on every PR targeting main.
# Push-to-main itself doesn't trigger — by the time it lands the branch
# CI already passed via the PR. This avoids paying twice for the same
# commit on a typical PR → merge flow.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

# If a new commit arrives on a PR before the previous run finishes,
# cancel the in-flight one. Keeps queue time honest on noisy branches.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      # Catch build-breaking changes (type errors only surface here, bad
      # imports, RSC/client boundary violations) before they reach main.
      # Supabase env isn't needed: pages degrade gracefully when it's absent
      # (the data fetchers already guard for it), so the build still completes.
      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # Security regression gate — re-runs the live exploits (B1/B2/B6) and
      # FAILS if any reopens. Runs ONLY when SECURITY_TEST_* secrets are set
      # (point them at a STAGING project — it creates+deletes a probe signup
      # each run). Skips cleanly otherwise so CI isn't blocked until configured.
      - name: Security regression
        if: ${{ secrets.SECURITY_TEST_SUPABASE_URL != '' }}
        run: pnpm test:security
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SECURITY_TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SECURITY_TEST_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SECURITY_TEST_SERVICE_ROLE_KEY }}
